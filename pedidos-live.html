<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedidos en Vivo | Lobo24</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
    --bg:#0f0f14;
    --bg2:#181822;
    --card:#1f1f2b;
    --border:#2f2f40;
    --accent:#f0c040;
    --green:#35d07f;
    --red:#ff5d5d;
    --text:#f5f5f5;
    --muted:#999;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
}

header{
    padding:20px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
}

header h1{
    font-size:28px;
    color:var(--accent);
}

#pedidoCount{
    background:var(--accent);
    color:#000;
    padding:6px 12px;
    border-radius:10px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.pedidos-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

.pedido-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    position:relative;
}

.status{
    position:absolute;
    top:12px;
    right:12px;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:bold;
}

.status.pendiente{
    background:#ff9800;
    color:#000;
}

.status.preparacion{
    background:#2196f3;
}

.status.entregado{
    background:var(--green);
    color:#000;
}

.pedido-card h2{
    margin-bottom:10px;
    color:var(--accent);
}

.info{
    margin-bottom:8px;
    color:#ddd;
}

.total{
    font-size:26px;
    font-weight:bold;
    margin:15px 0;
    color:var(--green);
}

.items{
    margin-top:10px;
    border-top:1px solid var(--border);
    padding-top:10px;
}

.item{
    margin-bottom:6px;
    color:#ccc;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:18px;
}

.actions button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

.btn-prep{
    background:#2196f3;
    color:#fff;
}

.btn-entregado{
    background:var(--green);
    color:#000;
}

.actions button:hover{
    opacity:.85;
}

.empty{
    text-align:center;
    margin-top:80px;
    color:var(--muted);
    font-size:18px;
}

</style>
</head>

<body>

<header>
    <h1>📦 Pedidos en Vivo</h1>
    <div id="pedidoCount">0 pedidos</div>
</header>

<div class="container">

    <div id="pedidosContainer" class="pedidos-grid"></div>

    <div id="emptyState" class="empty">
        No hay pedidos pendientes
    </div>

</div>

<audio id="alertSound">
    <source src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" type="audio/ogg">
</audio>

<script type="module" src="./pedidos-live.js"></script>

</body>
</html>
